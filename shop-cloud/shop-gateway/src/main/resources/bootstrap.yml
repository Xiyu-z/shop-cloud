# Tomcat
server:
  port: 8081

# Spring
spring:
  application:
    # 应用名称
    name: shop-gateway
  profiles:
    # 环境配置
    active: dev
  cloud:
    nacos:
      # 注册到Nacos服务中
      discovery:
        # 服务注册地址
        server-addr: 127.0.0.1:8848
        # 命名空间
        namespace: d208ff0b-ac76-4257-8c5d-a78f16665e7e
      # 读取Nacos的配置文件
      config:
        # 配置中心地址
        server-addr: 127.0.0.1:8848
        # 配置文件格式
        file-extension: yml
        # 命名空间
        namespace: d208ff0b-ac76-4257-8c5d-a78f16665e7e
        # Nacos中的分组
        group: DEFAULT_GROUP
        # 共享配置
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}