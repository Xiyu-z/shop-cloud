<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>环保商城</title>
    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #ffffff;
            flex-direction: column;
            min-height: 100vh;
            display: flex;
        }

        .container {
            width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .search-form {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .search-form input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px 0 0 5px;
            width: 70%; /* 调整输入框宽度 */
        }

        .search-form button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
        }

        .search-form button:hover {
            background-color: #0056b3;
        }

        .header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
        }

        header {
            background-color: rgb(11, 169, 232);
            color: #fff;
            padding: 10px 0;
        }

        .logo {
            display: flex;
            align-items: center;
        }

        .logo img {
            width: 80px;
            height: auto;
            margin-right: 10px;
        }

        .logo span {
            font-size: 24px;
            font-weight: bold;
        }

        nav ul {
            list-style-type: none;
            padding: 0;
            text-align: right;
        }

        nav ul li {
            display: inline-block;
            margin-left: 20px;
        }

        nav ul li:first-child {
            margin-left: 0;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
        }

        nav ul li a:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }

        .hero h2 {
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .product-list {
            margin: 0 auto;
            padding: 20px 0;
            background-color: #fff;
        }

        .product-list .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .types {
            max-width: 1200px;
            margin: 0 auto;
        }
        .product {
            width: 22%;
            margin-bottom: 20px;
            padding: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .product img {
            width: 100%;
            height: auto;
        }

        .product h3 {
            margin-top: 10px;
            font-size: 16px;
        }

        .product p {
            color: #007bff;
            font-weight: bold;
            font-size: 18px;
            margin-top: 5px;
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            width: 100%;
            margin-top: auto;
            /*position: sticky;*/
            /*bottom: 0;*/
        }

    </style>
</head>
<body>
<header>
    <div class="header">
        <div class="logo">
            <img src="./static/img.png" alt="环保商城">
            <span>环保商城</span>
        </div>
        <nav>
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">分类</a></li>
                <li><a href="#">购物车</a></li>
                <li><a href="#">我的订单</a></li>
                <li><a href="#">地址管理</a></li>
                <li><a href="#">登录</a></li>
                <li><a href="#">注册</a></li>
            </ul>
        </nav>
    </div>
</header>


<section class="product-list">
    <div class="container">
        <form class="search-form">
            <input type="text" placeholder="输入关键词...">
            <button type="submit">查询</button>
        </form>
    </div>
</section>

<section class="product-list">

    </div>
    <div class="container">
        <div class="product">

    </div>
</section>

    </div>
    <div class="container">

            <h3>商品名称1</h3>
            <p>￥100.00</p>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/400" alt="商品2">
            <h3>商品名称2</h3>
            <p>￥120.00</p>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/400" alt="商品3">
            <h3>商品名称3</h3>
            <p>￥80.00</p>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/400" alt="商品4">
            <h3>商品名称4</h3>
            <p>￥150.00</p>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/400" alt="商品5">

        </div>
    </div>
</section>


<footer>
    <div class="container">
        <p>&copy; 2024 环保商城. 版权所有.</p>
    </div>
</footer>
</body>
</html>
