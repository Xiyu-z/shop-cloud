spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:300/shop-cloud?serverTimezone=GMT%2B8&userUnicode=true&characterEncoding=utf8&rewriteBatchedStatements=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations:
    classpath:mapper/*.xml

logging:
  level:
    root: info
    com.shop.order.mapper: debug
